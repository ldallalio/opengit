name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  tauri:
    name: Tauri (${{ matrix.platform }} ${{ matrix.targetLabel }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            targetLabel: arm64
            args: --target aarch64-apple-darwin --bundles app,dmg
          - platform: macos-latest
            targetLabel: x64
            args: --target x86_64-apple-darwin --bundles app,dmg
          - platform: ubuntu-22.04
            targetLabel: x64
            args: ""
          - platform: windows-latest
            targetLabel: x64
            args: ""

    steps:
      - uses: actions/checkout@v5

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install macOS Rust targets
        if: runner.os == 'macOS'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code signing + notarization. When these secrets are unset the
          # build proceeds unsigned, so non-macOS and fork builds keep working.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: OpenGit ${{ github.ref_name }}
          releaseBody: |
            Official OpenGit release. Artifacts are updater-signed by Tauri. macOS bundles are code-signed and notarized when signing secrets are configured; Windows binaries are currently unsigned.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }} --config src-tauri/tauri.release.conf.json

      # Tauri notarizes the .app but not the DMG wrapper; notarize + staple the
      # DMGs and replace the release assets so the container passes Gatekeeper too.
      - name: Notarize and staple DMGs
        if: runner.os == 'macOS'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_ID}" ]; then
            echo "Signing secrets not configured; skipping DMG notarization."
            exit 0
          fi
          shopt -s nullglob
          for dmg in apps/desktop/src-tauri/target/*/release/bundle/dmg/*.dmg; do
            echo "Notarizing ${dmg}"
            xcrun notarytool submit "${dmg}" \
              --apple-id "${APPLE_ID}" \
              --password "${APPLE_PASSWORD}" \
              --team-id "${APPLE_TEAM_ID}" \
              --wait
            xcrun stapler staple "${dmg}"
            gh release upload "${{ github.ref_name }}" "${dmg}" --clobber
          done

  publish:
    name: Publish release
    needs: tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish draft and mark as latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release edit "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --draft=false \
            --prerelease=false
          release_id=$(gh api "repos/${{ github.repository }}/releases/tags/${{ github.ref_name }}" -q .id)
          gh api -X PATCH "repos/${{ github.repository }}/releases/${release_id}" -f make_latest=true
