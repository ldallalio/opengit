name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  tauri:
    name: Tauri (${{ matrix.platform }} ${{ matrix.targetLabel }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            targetLabel: arm64
            args: --target aarch64-apple-darwin --bundles app
          - platform: macos-latest
            targetLabel: x64
            args: --target x86_64-apple-darwin --bundles app
          - platform: ubuntu-22.04
            targetLabel: x64
            args: ""
          - platform: windows-latest
            targetLabel: x64
            args: ""

    steps:
      - uses: actions/checkout@v5

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install macOS Rust targets
        if: runner.os == 'macOS'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: OpenGit ${{ github.ref_name }}
          releaseBody: |
            Alpha release build.

            These artifacts are updater-signed by Tauri, but platform code signing/notarization is not configured yet. macOS DMG packaging is intentionally deferred until notarization is configured.
          releaseDraft: true
          prerelease: true
          args: ${{ matrix.args }} --config src-tauri/tauri.release.conf.json
