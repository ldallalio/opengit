name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  desktop:
    name: Desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
          - windows-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - run: npm ci

      - run: npm run typecheck

      - run: npm run build

      - run: npm run test:js

      - run: cargo check --manifest-path apps/desktop/src-tauri/Cargo.toml

      # Several tests spawn a real `git` subprocess per commit (up to 55 in a
      # loop) against their own temp repo. Full default parallelism on the
      # 4-vCPU ubuntu-latest runner has intermittently starved these under
      # load ("could not parse HEAD" / "could not read <sha>" — see
      # 065a9b3); capping thread count is cheap insurance against that class
      # of flake without weakening the test itself.
      - run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml -- --test-threads=2
