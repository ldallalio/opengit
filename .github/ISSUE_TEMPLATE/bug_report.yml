name: Bug report
description: Report a reproducible OpenGit problem.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not include tokens, private repository contents, or confidential logs.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include a minimal public repo or generated fixture if possible.
      placeholder: |
        1. Open repo...
        2. Click...
        3. See...
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
        - Other
    validations:
      required: true
  - type: input
    id: git-version
    attributes:
      label: Git version
      placeholder: git version 2.x.x
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Redact repository names, remote URLs, user names, tokens, and private file contents.
